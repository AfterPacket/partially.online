<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <!--META-->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous"/>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<div id="banner-stack" class="banner-stack"></div>

<div id="sponsor-header" class="sponsor-slot sponsor-slot-header"></div>

<header class="header">
  <div class="brand">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
    </svg>
    <span>Internet Outage Monitor</span>
  </div>
  <div class="header-stats">
    <span class="hstat" id="hstat-active">
      <span class="dot dot-active"></span>
      <strong id="val-active">–</strong> active events
    </span>
    <span class="hstat" id="hstat-severe">
      <span class="dot dot-severe"></span>
      <strong id="val-severe">–</strong> severe
    </span>
    <span class="hstat-time" id="hstat-time">–</span>
  </div>
  <div class="live-badge"><span class="live-pulse"></span>LIVE</div>
</header>

<div class="layout">

  <div class="map-wrap">
    <div id="map"></div>
    <div class="legend">
      <div class="legend-title">Severity</div>
      <div class="legend-row"><span class="lswatch sev-severe"></span>Severe</div>
      <div class="legend-row"><span class="lswatch sev-significant"></span>Significant</div>
      <div class="legend-row"><span class="lswatch sev-minor"></span>Minor</div>
      <div class="legend-row"><span class="lswatch sev-normal"></span>Normal</div>
    </div>
  </div>

  <aside class="sidebar">
    <div class="sidebar-head">
      <h2>Active Events</h2>
      <div class="filters">
        <select id="filter-sev" class="filter-sel">
          <option value="">All severities</option>
          <option value="severe">Severe</option>
          <option value="significant">Significant</option>
          <option value="minor">Minor</option>
        </select>
        <select id="filter-type" class="filter-sel">
          <option value="">All types</option>
          <option value="shutdown">Shutdown</option>
          <option value="disruption">Disruption</option>
          <option value="censorship">Censorship</option>
        </select>
      </div>
    </div>
    <div id="event-list" class="event-list"><!--EVENTS--></div>
    <div id="sponsor-sidebar" class="sponsor-slot sponsor-slot-sidebar"></div>
    <div class="sidebar-footer">
      Hosted &amp; designed by
      <a href="https://digitalsystems.cc" target="_blank" rel="noopener">Digital Systems LLC</a>
      / <a href="https://github.com/afterpacket" target="_blank" rel="noopener">AfterPacket</a>
    </div>
  </aside>

</div>

<div id="resolved-bar" class="resolved-bar hidden">
  <div class="resolved-bar-header" id="resolved-toggle">
    <span class="resolved-bar-title">
      <span class="resolved-icon">&#10003;</span> Recently Resolved
    </span>
    <span class="resolved-count" id="resolved-count"></span>
    <span class="resolved-chevron" id="resolved-chevron">&#9660;</span>
  </div>
  <div id="resolved-list" class="resolved-list"></div>
</div>

<div id="sponsor-footer" class="sponsor-slot sponsor-slot-footer"></div>

<div id="detail-panel" class="detail-panel hidden">
  <div class="dp-header">
    <div class="dp-title-row">
      <h3 id="dp-title">—</h3>
      <span id="dp-badge" class="sev-badge"></span>
    </div>
    <button class="share-btn" id="dp-share">Share</button>
    <button class="dp-close" id="dp-close">&#x2715;</button>
  </div>
  <div class="dp-body">
    <section class="dp-section">
      <h4>Active Events</h4>
      <div id="dp-events"></div>
    </section>
    <section class="dp-section">
      <div class="dp-section-head">
        <h4>History</h4>
        <div class="hist-controls">
          <select id="hist-category" class="filter-sel">
            <option value="">All types</option>
            <option value="outages">Outages</option>
            <option value="censorship">Censorship</option>
          </select>
          <select id="hist-days" class="filter-sel">
            <option value="30">30 days</option>
            <option value="90">90 days</option>
            <option value="180">180 days</option>
          </select>
        </div>
      </div>
      <div class="chart-wrap"><canvas id="hist-chart"></canvas></div>
      <div id="hist-table" class="hist-table"></div>
    </section>
  </div>
</div>

<div id="share-menu" class="share-menu hidden">
  <a id="share-x" class="share-opt" target="_blank" rel="noopener">Share on X</a>
  <a id="share-bsky" class="share-opt" target="_blank" rel="noopener">Share on Bluesky</a>
  <button id="share-mastodon" class="share-opt">Share on Mastodon</button>
  <button id="share-copy" class="share-opt">Copy link</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"
        integrity="sha384-Ukv1p/xTma6P4/2bY5KzWBw+ydSpXmhCMtyciIQVDJ1RmOxtCYNMF1uXT9T63H67" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"
        integrity="sha384-e6nUZLBkQ86NJ6TVVKAeSaK8jWa3NhkYWZFomE39AvDbQWeie9PlQqM3pmYW5d1g" crossorigin="anonymous"></script>
<script src="/js/map.js?v=2"></script>
<script src="/js/charts.js?v=2"></script>
<script src="/js/app.js?v=2"></script>
</body>
</html>
