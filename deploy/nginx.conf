# /etc/nginx/sites-available/outage-monitor
# Reverse proxy: public :80 -> app bound to 127.0.0.1:8000 (see .env HOST).
# After `certbot --nginx`, this file gets a matching :443 server block added
# automatically and the block below becomes an HTTP->HTTPS redirect.

server {
    listen 80;
    listen [::]:80;
    server_name YOURDOMAIN.com www.YOURDOMAIN.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        # security.py reads X-Forwarded-For for rate limiting / admin audit
        # logging -- without this every request looks like it's from nginx.
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
